name: "Comment"
description: "Creates or updates a comment on the PR with the progress of the tests"
inputs:
  comment_id:
    description: 'The ID of the comment to append to'
    required: false
  content:
    description: 'The content to add to the comment'
    required: true
  marker:
    description: 'A unique marker to identify the comment across workflow runs. When set, the action will find and reuse an existing comment instead of creating a new one.'
    required: false
outputs: 
  comment_id: 
    description: "ID of the comment" 
    value: ${{ steps.update-comment.outputs.comment_id }}
runs:
  using: "composite"
  steps:
    - id: update-comment
      uses: actions/github-script@v8
      with:
        script: |
          const commentId = "${{ inputs.comment_id }}";
          const marker = "${{ inputs.marker }}";
          let content = `${{ inputs.content }}`;

          // If no comment_id, either find an existing comment by marker or create a new one
          if (!commentId) {
            const hiddenTag = marker
              ? `<!-- livecharts-bot:${marker} -->`
              : "";

            let existingCommentId = null;

            // Search for a previous comment with the same marker
            if (marker) {
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              const existing = comments.find(c => c.body && c.body.includes(hiddenTag));
              if (existing) {
                existingCommentId = existing.id;
              }
            }

            const body = `${hiddenTag}\n${content}`;

            if (existingCommentId) {
              // Reuse the existing comment (replace body entirely)
              await github.rest.issues.updateComment({
                comment_id: existingCommentId,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });

              core.setOutput("comment_id", existingCommentId);
            } else {
              // Create a new comment
              const newComment = await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });

              core.setOutput("comment_id", newComment.data.id);
            }

            return;
          }

          const comment = await github.rest.issues.getComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: commentId
          });

          content = content
            .replace(new RegExp('#success', 'g'), '✅')
            .replace(new RegExp('#failure', 'g'), '❌')
            .replace(new RegExp('#cancelled', 'g'), '⚠️');

          let body = comment.data.body;

          body += `\n${content}`;

          await github.rest.issues.updateComment({
            comment_id: commentId,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body 
          });
