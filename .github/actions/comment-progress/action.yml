name: "Comment Progress"
inputs:
  comment_id:
    description: 'The ID of the comment to update'
    required: false
  complete_nuget:
    description: 'completes the nuget step, the value must be a string containing the url to the artifact'
    required: false
  complete_core_tests:
    description: 'completes the core tests step, the value must be a string containing "success" if succeeded'
    required: false
  complete_win_tests:
    description: 'completes the windows tests step, the value must be a string containing "success" if succeeded'
    required: false
  complete_linux_tests:
    description: 'completes the linux tests step, the value must be a string containing "success" if succeeded'
    required: false
  complete_mac_tests:
    description: 'completes the macos/catalyst tests step, the value must be a string containing "success" if succeeded'
    required: false
  complete_android_tests:
    description: 'completes the android tests step, the value must be a string containing "success" if succeeded'
    required: false
  complete_ios_tests:
    description: 'completes the ios tests step, the value must be a string containing "success" if succeeded'
    required: false
outputs: 
  comment_id: 
    description: "ID of the comment" 
    value: ${{ steps.update-comment.outputs.comment_id }}
runs:
  using: "composite"
  steps:
    - id: update-comment
      env:
          RUN_ID: ${{ github.run_id }}
          COMMENT_ID: ${{ inputs.comment_id }}
          NUGET_URL: ${{ inputs.complete_nuget }}
          CORE_TESTS_STATUS: ${{ inputs.complete_core_tests }}
          WIN_TESTS_STATUS: ${{ inputs.complete_win_tests }}
          LINUX_TESTS_STATUS: ${{ inputs.complete_linux_tests }}
          MAC_TESTS_STATUS: ${{ inputs.complete_mac_tests }}
          ANDROID_TESTS_STATUS: ${{ inputs.complete_android_tests }}
          IOS_TESTS_STATUS: ${{ inputs.complete_ios_tests }}          
      uses: actions/github-script@v8
      with:
        script: |
          const commentId = "${COMMENT_ID}";
          const nugetUrl = "${NUGET_URL}";          
          const coreTestsStatus = "${CORE_TESTS_STATUS}";
          const winTestsStatus = "${WIN_TESTS_STATUS}";
          const linuxTestsStatus = "${LINUX_TESTS_STATUS}";
          const macTestsStatus = "${MAC_TESTS_STATUS}";
          const androidTestsStatus = "${ANDROID_TESTS_STATUS}";
          const iosTestsStatus = "${IOS_TESTS_STATUS}";
          
          const comment = await github.rest.issues.getComment({ 
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: commentId
          });

          if (!comment || !comment.data || !comment.data.body) {
            let firstBody = `Build in progress...
            
            - [ ] Building NuGet packages ⏳...
            - [ ] Testing core packages ⏳...
            - [ ] Testing UI packages on Linux ⏳...
            - [ ] Testing UI packages on Windows ⏳...
            - [ ] Testing UI packages on MacOs/Catalyst ⏳...
            - [ ] Testing UI packages on Android ⏳...
            - [ ] Testing UI packages on iOS ⏳...
            `;

            const newComment = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: firstBody
            });

            core.setOutput("comment_id", newComment.data.id);

            return;
          }
          
          let body = comment.data.body;

          if (nugetUrl) {
            body = body.replace(
              "- [ ] Building NuGet packages ⏳...", 
              `- [x] Building [NuGet packages](${nugetUrl}). While these changes are approved and published to the NuGet Gallery, you can install these packages locally. If you need help to do so, check out [this guide](https://stackoverflow.com/questions/10240029/how-do-i-install-a-nuget-package-nupkg-file-locally-to-visual-studio) article.`);
          }

          if (coreTestsStatus) {
            if (coreTestsStatus == "success") {
              body = body.replace(
                "- [ ] Testing core packages ⏳...", 
                `- [x] Testing core packages ✅ [succeeded](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            } else {
              body = body.replace(
                "- [ ] Testing core packages ⏳...", 
                `- [x] Testing core packages ❌ [failed](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            }
          }

          if (winTestsStatus) {
            if (winTestsStatus == "success") {
              body = body.replace(
                "- [ ] Testing UI packages on Windows ⏳...", 
                `- [x] Testing UI packages on Windows ✅ [succeeded](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            } else {
              body = body.replace(
                "- [ ] Testing UI packages on Windows ⏳...", 
                `- [x] Testing UI packages on Windows ❌ [failed](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            }
          }

          if (linuxTestsStatus) {
            if (linuxTestsStatus == "success") {
              body = body.replace(
                "- [ ] Testing UI packages on Linux ⏳...", 
                `- [x] Testing UI packages on Linux ✅ [succeeded](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            } else {
              body = body.replace(
                "- [ ] Testing UI packages on Linux ⏳...", 
                `- [x] Testing UI packages on Linux ❌ [failed](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            }
          }

          if (macTestsStatus) {
            if (macTestsStatus == "success") {
              body = body.replace(
                "- [ ] Testing UI packages on MacOs/Catalyst ⏳...", 
                `- [x] Testing UI packages on MacOs/Catalyst ✅ [succeeded](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            } else {
              body = body.replace(
                "- [ ] Testing UI packages on MacOs/Catalyst ⏳...", 
                `- [x] Testing UI packages on MacOs/Catalyst ❌ [failed](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            }
          }

          if (androidTestsStatus) {
            if (androidTestsStatus == "success") {
              body = body.replace(
                "- [ ] Testing UI packages on Android ⏳...", 
                `- [x] Testing UI packages on Android ✅ [succeeded](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            } else {
              body = body.replace(
                "- [ ] Testing UI packages on Android ⏳...", 
                `- [x] Testing UI packages on Android ❌ [failed](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            }
          }

          if (iosTestsStatus) {
            if (iosTestsStatus == "success") {
              body = body.replace(
                "- [ ] Testing UI packages on iOS ⏳...", 
                `- [x] Testing UI packages on iOS ✅ [succeeded](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            } else {
              body = body.replace(
                "- [ ] Testing UI packages on iOS ⏳...", 
                `- [x] Testing UI packages on iOS ❌ [failed](https://github.com/Live-Charts/LiveCharts2/actions/runs/${RUN_ID})`);
            }
          }

          await github.rest.issues.updateComment({
            comment_id: commentId,
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body });