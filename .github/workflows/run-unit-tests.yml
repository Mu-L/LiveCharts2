name: Core Unit Tests

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  test:
    runs-on: windows-2025
    permissions:
      contents: read
      actions: read
      checks: write

    strategy:
      matrix:
        framework: [ net8.0, net462 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Run unit tests
        run: dotnet run --project tests/CoreTests/CoreTests.csproj -f ${{ matrix.framework }} --report-trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.framework }}
          path: "**/*.trx"

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish results
        uses: dorny/test-reporter@v2.4.0
        with:
          name: test-results
          path: "artifacts/**/*.trx"
          reporter: dotnet-trx