name: Core Unit Tests

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

env:
  VERSION_SURFIX: -pr${{ github.event.pull_request.number }}+sha.${{ github.sha }}

jobs:

  build-packages: 
    runs-on: windows-2025    
    steps: 
      - name: Checkout 
        uses: actions/checkout@v6.0.1
      
      - name: Setup .NET 
        uses: actions/setup-dotnet@v5.0.1
        with: 
          dotnet-version: '10.0.100'
      
      - name: Pack LiveChartsCore 
        run: dotnet pack src/LiveChartsCore -c Release -o artifacts /p:IsPacking=true /p:LiveChartsVersionSurfix=$VERSION_SURFIX

      - name: Pack LiveChartsCore.SkiaSharpView 
        run: dotnet pack src/skiasharp/LiveChartsCore.SkiaSharp -c Release -o artifacts /p:IsPacking=true /p:LiveChartsVersionSurfix=$VERSION_SURFIX
        
      - name: Publish to GitHub Packages
        run: dotnet nuget push **/*.nupkg --source "https://nuget.pkg.github.com/beto-rodriguez/index.json" --api-key ${{ secrets.GH_TOKEN }}

  run-tests:
    runs-on: windows-2025
    needs: build-packages
    strategy:
      matrix:
        framework: [ net8.0, net462 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.1
        with:
          dotnet-version: '10.0.100'

      - name: Run unit tests
        run: dotnet run --project tests/CoreTests/CoreTests.csproj -f ${{ matrix.framework }} --report-trx -p:UseNuGetPackages=true -p:LiveChartsVersionSurfix=$VERSION_SURFIX

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.framework }}
          path: "**/*.trx"

  publish:
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish results
        uses: dorny/test-reporter@v2.4.0
        with:
          name: test-results
          path: "artifacts/**/*.trx"
          reporter: dotnet-trx