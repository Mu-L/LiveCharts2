name: Core Unit Tests

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:

  build-packages: 
    runs-on: windows-2025    
    steps: 
      - name: Checkout 
        uses: actions/checkout@v6.0.1
      
      - name: Setup .NET 
        uses: actions/setup-dotnet@v5.0.1
        with: 
          dotnet-version: '10.0.100'
      
      - name: Pack LiveChartsCore 
        run: dotnet pack src/livechartscore -c Release -o artifacts

      - name: Pack LiveChartsCore.SkiaSharpView 
        run: dotnet pack src/LiveChartsCore.SkiaSharpView -c Release -o artifacts
        
      - name: Publish to GitHub Packages
        run: dotnet nuget push artifacts/*.nupkg \
                --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
                --api-key ${{ secrets.GH_TOKEN }}

  run-tests:
    runs-on: windows-2025
    needs: build-packages
    strategy:
      matrix:
        framework: [ net8.0, net462 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.1
        with:
          dotnet-version: '10.0.100'

      - name: Run unit tests
        run: dotnet run \
          --project tests/CoreTests/CoreTests.csproj \
          -f ${{ matrix.framework }} \
          -p:UseNuGetPackages=true \
          --report-trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.framework }}
          path: "**/*.trx"

  publish:
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish results
        uses: dorny/test-reporter@v2.4.0
        with:
          name: test-results
          path: "artifacts/**/*.trx"
          reporter: dotnet-trx