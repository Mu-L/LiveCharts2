name: Report Progress

on:
  workflow_call:
    inputs:
      id:
        description: "Identifier for the test target"
        required: true
        type: string
      comment_id:
        description: "PR comment ID to update"
        required: true
        type: string

jobs:
  report:
    runs-on: ubuntu-24.04
    if: always()
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Download artifacts
        uses: actions/download-artifact@v7.0.0
        with:
            path: ${{ inputs.id }}-results
            pattern: ${{ inputs.id }}-results-*

      - name: Publish results
        id: report
        uses: dorny/test-reporter@v2.4.0
        with:
            name: ${{ inputs.id }}-results
            path: "${{ inputs.id }}-results/**/*.trx"
            reporter: dotnet-trx

      - name: Update comment progress
        uses: ./.github/actions/comment-progress
        with:
            comment_id: ${{ inputs.comment_id }}
            complete_tests: ${{ inputs.id }}
            test_status: ${{ steps.report.outputs.passed }},${{ steps.report.outputs.failed }}