name: LiveCharts
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  issues: write

on:
  push:
    branches:
      - master
  pull_request:

jobs:

  report-progress-starting:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6.0.1        
      - uses: ./.github/actions/comment-progress
        if: github.event_name == 'pull_request'
        id: create-comment
        with:
          marker: pr-${{ github.event.pull_request.number }}
          content: | 
            #### Thanks for your contribution!

            The build and test process is starting. This may take a while.
            You can find more details below as the process continues or at the [actions tab](https://github.com/Live-Charts/LiveCharts2/actions/runs/${{ github.run_id }}).
    outputs: 
      comment_id: ${{ steps.create-comment.outputs.comment_id }}

  prepare:
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.vars.outputs.suffix }}
    steps:
      - id: vars
        run:
          echo "suffix=dev-${{ github.run_number }}" >> $GITHUB_OUTPUT

  pack: 
    runs-on: windows-2025
    needs: [report-progress-starting, prepare]
    strategy:
      matrix:
        include:
          - short-name: core
            project: src/LiveChartsCore
          - short-name: skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp
          - short-name: avalonia-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp.Avalonia
            workloads: wasm-tools, maui
          - short-name: blazor-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Blazor
          - short-name: eto-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Eto
          - short-name: maui-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Maui
            workloads: maui
          - short-name: uno-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Uno.WinUI
            workloads: wasm-tools, maui
          - short-name: winui-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.WinUI
          - short-name: winforms-skiasharp            
            project: src/skiasharp/LiveChartsCore.SkiaSharp.WinForms
          - short-name: wpf-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp.WPF          
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Setup .NET and Workloads
        uses: ./.github/actions/setup-dotnet-and-workloads
        with:
          workloads: ${{ matrix.workloads }}

      - name: Pack
        run: 
          dotnet pack ${{ matrix.project }} -c Release -o artifacts /p:IsPacking=true /p:LiveChartsVersionSuffix=-${{ needs.prepare.outputs.suffix }}

      - name: Upload packages
        id: upload
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.short-name }}-package
          retention-days: 30
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

  collect-packages:
    runs-on: ubuntu-24.04
    needs: [pack, report-progress-starting, prepare]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1
    
      - name: Merge all package artifacts into one 
        uses: actions/upload-artifact/merge@v6
        id: merge
        with: 
          name: nuget-packages 
          pattern: "*-package"
          retention-days: 30
          delete-merged: true

      - name: Update Comment
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
          content: |
            
            #### Packing complete!

            You can download the NuGet packages for this build [here (dev-${{ github.run_number }})](${{ steps.merge.outputs.artifact-url }}).
            The packages will be available for 30 days, you can either [use them directly](https://stackoverflow.com/questions/43400069/add-a-package-with-a-local-package-file-in-dotnet), or wait for this PR to be merged to have them published to NuGet.org.

  # ============================================================
  # Section 1: Core & Snapshot Tests (no pack dependency needed)
  # ============================================================

  test-core:
    runs-on: windows-2025
    needs: [report-progress-starting, prepare]
    strategy:
      fail-fast: false
      matrix:
        framework: [ net8.0, net462 ]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          id: core
          test-id: core-${{ matrix.framework }}
          livecharts-suffix: ${{ needs.prepare.outputs.suffix }}
          test-type: core
          target-framework: ${{ matrix.framework }}
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-snapshot:
    runs-on: windows-2025
    needs: [report-progress-starting, prepare]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          id: snapshot
          test-id: snapshot
          livecharts-suffix: ${{ needs.prepare.outputs.suffix }}
          test-type: snapshot
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  after-core-tests:
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - report-progress-starting
      - test-core
      - test-snapshot
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Report core tests passed
        if: ${{ always() && github.event_name == 'pull_request' && needs.test-core.result == 'success' && needs.test-snapshot.result == 'success' }}
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
          content: |

            #### Section 1: Core & Snapshot Tests ✅

            Core #${{ needs.test-core.result }} | Snapshot #${{ needs.test-snapshot.result }}

      - name: Report core tests failure
        if: ${{ always() && github.event_name == 'pull_request' && (needs.test-core.result != 'success' || needs.test-snapshot.result != 'success') }}
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
          content: |

            #### Section 1: Core & Snapshot Tests ❌

            Core #${{ needs.test-core.result }} | Snapshot #${{ needs.test-snapshot.result }}

  report-code-coverage:
    runs-on: ubuntu-24.04
    if: ${{ needs.test-core.result == 'success' && needs.test-snapshot.result == 'success' }}
    needs: [after-core-tests, report-progress-starting, test-core, test-snapshot]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Download coverage results
        uses: actions/download-artifact@v7.0.0
        with:
          path: ./artifacts
          pattern: coverage-*
          merge-multiple: true

      - name: Install coverage tools
        run: |
          dotnet tool install -g dotnet-coverage
          dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Merge coverage results
        run: dotnet-coverage merge ./artifacts/*.coverage -f xml -o coverage.xml

      - name : Generate Badge
        run: reportgenerator -reports:coverage.xml -targetdir:badge-out -reporttypes:HtmlSummary,Badges  -filters:"-ViewModelsSamples*;-CommunityToolkit*;-Analyzer*;-MSTest*;-SnapshotTests*;-CoreTests*"

      - name: Get previous coverage from badges branch
        id: old-coverage
        run: |
          git fetch origin badges:refs/remotes/origin/badges 2>/dev/null || true

          OLD_COVERAGE=$(git show origin/badges:badge_linecoverage.svg 2>/dev/null \
            | grep -oP '>\K[0-9]+\.?[0-9]*%' | head -1 || echo "N/A")

          echo "value=${OLD_COVERAGE}" >> $GITHUB_OUTPUT

      - name: Get new coverage from generated badge
        id: new-coverage
        run: |
          NEW_COVERAGE=$(grep -oP '>\K[0-9]+\.?[0-9]*%' badge-out/badge_linecoverage.svg | head -1 || echo "N/A")
          echo "value=${NEW_COVERAGE}" >> $GITHUB_OUTPUT

      - name: Compute coverage delta
        id: delta
        run: |
          OLD="${{ steps.old-coverage.outputs.value }}"
          NEW="${{ steps.new-coverage.outputs.value }}"

          if [[ "$OLD" == "N/A" || "$NEW" == "N/A" ]]; then
            echo "value=N/A" >> $GITHUB_OUTPUT
            echo "emoji=📊" >> $GITHUB_OUTPUT
          else
            OLD_NUM=$(echo "$OLD" | tr -d '%')
            NEW_NUM=$(echo "$NEW" | tr -d '%')
            DELTA=$(echo "$NEW_NUM - $OLD_NUM" | bc)

            if (( $(echo "$DELTA > 0" | bc -l) )); then
              echo "value=+${DELTA}%" >> $GITHUB_OUTPUT
              echo "emoji=📈" >> $GITHUB_OUTPUT
            elif (( $(echo "$DELTA < 0" | bc -l) )); then
              echo "value=${DELTA}%" >> $GITHUB_OUTPUT
              echo "emoji=📉" >> $GITHUB_OUTPUT
            else
              echo "value=0%" >> $GITHUB_OUTPUT
              echo "emoji=➡️" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Deploy Badge to Branch
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./badge-out
          publish_branch: badges

      - name: Report coverage comparison
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
          content: |

            #### Code Coverage ${{ steps.delta.outputs.emoji }}

            | | Line Coverage |
            |---|---|
            | **Before** | ${{ steps.old-coverage.outputs.value }} |
            | **After** | ${{ steps.new-coverage.outputs.value }} |
            | **Delta** | ${{ steps.delta.outputs.value }} |

  # ============================================================
  # Section 2: UI Tests (require NuGet packages from pack job)
  # ============================================================

  test-windows:
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          - id: eto
          - id: maui
            tf: net10.0-windows10.0.19041.0
            workloads: maui
          - id: uno
            tf: net10.0-desktop
            workloads: maui
          - id: uno
            tf: net10.0-windows10.0.19041.0
            workloads: maui
          - id: winui
          - id: winforms-net10
          - id: winforms-net10w19041
          - id: winforms-net462          
          - id: wpf-net10
          - id: wpf-net10w19041
          - id: wpf-net462
          
    needs: [pack, report-progress-starting, collect-packages, prepare]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: windows
          test-type: factos
          test-id: ${{ matrix.id }}
          livecharts-suffix: ${{ needs.prepare.outputs.suffix }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          # - id: eto, requires additional setup i think...
          - id: uno
            tf: net10.0-desktop
            workloads: android
    needs: [pack, report-progress-starting, collect-packages, prepare]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@v4.2

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: linux
          test-type: factos
          test-id: ${{ matrix.id }}
          livecharts-suffix: ${{ needs.prepare.outputs.suffix }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-mac:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          - id: eto
          - id: maui
            tf: net10.0-maccatalyst
            workloads: maui
          - id: uno
            tf: net10.0-desktop
            workloads: maui
    needs: [pack, report-progress-starting, collect-packages, prepare]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: mac
          test-type: factos
          test-id: ${{ matrix.id }}
          livecharts-suffix: ${{ needs.prepare.outputs.suffix }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          xcode-path: /Applications/Xcode_26.2.app
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-browser:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # ToDo: find why not running.
          # - id: blazor
          #   workloads: wasm-tools
          - id: avalonia-browser
            workloads: wasm-tools
          # ToDo: find why not running.
          # - id: uno
          #   tf: net10.0-browserwasm
          #   workloads: wasm-tools android
    needs: [pack, report-progress-starting, collect-packages, prepare]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: browser
          test-type: factos
          test-id: ${{ matrix.id }}
          livecharts-suffix: ${{ needs.prepare.outputs.suffix }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-android
            workloads: android
          - id: maui
            tf: net10.0-android
            workloads: maui-android
          # ToDo: find why not running.
          # - id: uno
          #   tf: net10.0-android
          #   workloads: android
    needs: [pack, report-progress-starting, collect-packages, prepare]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: android
          test-type: factos-android
          test-id: ${{ matrix.id }}
          livecharts-suffix: ${{ needs.prepare.outputs.suffix }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-ios:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-ios
            workloads: ios
          - id: maui-ios
            tf: net10.0-ios
            workloads: maui
          # disabled for now, in this uno version, it takes 3 times longer than the others (about 40 mins)
          # - id: uno
          #   tf: net10.0-ios
          #   workloads: ios android
    needs: [pack, report-progress-starting, collect-packages, prepare]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: ios
          test-type: factos-ios
          test-id: ${{ matrix.id }}
          livecharts-suffix: ${{ needs.prepare.outputs.suffix }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          xcode-path: /Applications/Xcode_26.2.app
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  after-ui-tests:
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - report-progress-starting
      - test-windows
      - test-linux
      - test-mac
      - test-browser
      - test-android
      - test-ios
      - prepare
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Download all test results
        uses: actions/download-artifact@v7.0.0
        with:
          path: ./artifacts

      - name: Publish all test results
        id: report
        uses: dorny/test-reporter@v2.4.0
        with:
          name: all-test-results
          path: "./artifacts/**/*.trx"
          reporter: dotnet-trx

      - name: Report UI tests passed
        if: ${{ always() && github.event_name == 'pull_request' && needs.test-windows.result == 'success' && needs.test-linux.result == 'success' && needs.test-mac.result == 'success' && needs.test-browser.result == 'success' && needs.test-android.result == 'success' && needs.test-ios.result == 'success' }}
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
          content: |

            #### Section 2: UI Tests ✅

            Windows #${{ needs.test-windows.result }} | Linux #${{ needs.test-linux.result }} | Mac #${{ needs.test-mac.result }} | Browser #${{ needs.test-browser.result }} | Android #${{ needs.test-android.result }} | iOS #${{ needs.test-ios.result }}

      - name: Report UI tests failure
        if: ${{ always() && github.event_name == 'pull_request' && (needs.test-windows.result != 'success' || needs.test-linux.result != 'success' || needs.test-mac.result != 'success' || needs.test-browser.result != 'success' || needs.test-android.result != 'success' || needs.test-ios.result != 'success') }}
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
          content: |
          
            #### Section 2: UI Tests ❌

            Windows #${{ needs.test-windows.result }} | Linux #${{ needs.test-linux.result }} | Mac #${{ needs.test-mac.result }} | Browser #${{ needs.test-browser.result }} | Android #${{ needs.test-android.result }} | iOS #${{ needs.test-ios.result }}
