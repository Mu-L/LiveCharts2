name: LiveCharts

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:

  build-packages: 
    runs-on: windows-2025    
    strategy:
      matrix:
        include:
          - short-name: core
            project: src/LiveChartsCore

          - short-name: skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp

          - short-name: avalonia-skiasharp
            project: src\skiasharp\LiveChartsCore.SkiaSharp.Avalonia

          - short-name: blazor-skiasharp
            project: src\skiasharp\LiveChartsCore.SkiaSharpView.Blazor

          - short-name: eto-skiasharp
            project: src\skiasharp\LiveChartsCore.SkiaSharpView.Eto

          - short-name: maui-skiasharp
            project: src\skiasharp\LiveChartsCore.SkiaSharpView.Maui
            workloads: [ maui ]

          - short-name: uno-skiasharp
            project: src\skiasharp\LiveChartsCore.SkiaSharpView.Uno.WinUI

          - short-name: winui-skiasharp
            project: src\skiasharp\LiveChartsCore.SkiaSharpView.WinUI

          - short-name: winforms-skiasharp            
            project: src\skiasharp\LiveChartsCore.SkiaSharp.WinForms

          - short-name: wpf-skiasharp
            project: src\skiasharp\LiveChartsCore.SkiaSharp.WPF
          
    steps: 
      - name: Checkout 
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0 # important for deterministic builds?
      
      - name: Setup .NET 
        uses: actions/setup-dotnet@v5.0.1
        with: 
          dotnet-version: '10.0.100'

      - name: Install Workloads 
        if: ${{ matrix.workloads }} 
        shell: pwsh 
        run: | 
          $workloads = "${{ join(matrix.workloads, ' ') }}".Split(' ')
          foreach ($workload in $workloads) {
            dotnet workload install $workload
          }
      
      - name: Pack
        run: dotnet pack ${{ matrix.project }} -c Release -o artifacts /p:IsPacking=true /p:LiveChartsVersionSurfix=-${{ github.sha }}
        
      - name: Publish
        run: |
          dotnet nuget push **/*.nupkg --source "https://nuget.pkg.github.com/beto-rodriguez/index.json" --api-key ${{ secrets.GH_TOKEN }}
          dotnet nuget push **/*.snupkg --source "https://nuget.pkg.github.com/beto-rodriguez/index.json" --api-key ${{ secrets.GH_TOKEN }}

      - name: Upload test results
        id: upload
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.short-name }}-package
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

  comment-packages-link:
    runs-on: ubuntu-24.04
    needs: build-packages
    permissions: 
      issues: write 
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v7.0.0
        with:
          path: collected

      - name: Flatten packages 
        run: | 
          mkdir -p flat 
          find collected -type f -name '*.nupkg' -exec cp {} flat/ \;
          find collected -type f -name '*.snupkg' -exec cp {} flat/ \;

      - id: upload
        uses: actions/upload-artifact@v6.0.0 
        with:
          name: livecharts-${{ github.sha }}
          path: flat/*        

      - uses: actions/github-script@v8
        with:
          script: |
            let body = `NuGet packages built successfully! 🥳
            
            You can download the NuGet packages with these changes [here](${process.env.ARTIFACT_URL}).
            
            While these changes are approved and published to the NuGet Gallery, you can install these packages locally. 
            If you need help to do so, check out [this guide](https://stackoverflow.com/questions/10240029/how-do-i-install-a-nuget-package-nupkg-file-locally-to-visual-studio) article.`;
              
            await github.rest.issues.createComment({
              issue_number: context.issue.number, 
              owner: context.repo.owner, 
              repo: context.repo.repo, 
              body
            });
        env: 
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}

  run-tests:
    runs-on: windows-2025
    needs: build-packages
    strategy:
      matrix:
        framework: [ net8.0, net462 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.1
        with:
          dotnet-version: '10.0.100'

      - name: Run unit tests
        run: dotnet run --project tests/CoreTests/CoreTests.csproj -f ${{ matrix.framework }} --report-trx -p:UseNuGetPackages=true -p:LiveChartsVersionSurfix=-${{ github.sha }}

      - name: Upload test results
        uses: actions/upload-artifact@v6.0.0
        with:
          name: test-results-${{ matrix.framework }}
          path: "**/*.trx"

  comment-test-results:
    runs-on: ubuntu-24.04
    needs: run-tests
    permissions:
      contents: read
      actions: read
      checks: write
      issues: write 
      pull-requests: write
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Download artifacts
        uses: actions/download-artifact@v7.0.0
        with:
          path: artifacts

      - name: Publish results
        id: report
        uses: dorny/test-reporter@v2.4.0
        with:
          name: test-results
          path: "artifacts/**/*.trx"
          reporter: dotnet-trx

      - name: Comment results
        uses: actions/github-script@v8
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            let body = '';
            
            if ('${{ steps.report.outputs.conclusion }}' == 'success') {
              body += `### All tests passed! 🎉\n\n`;
            } else {
              body += `### Some tests failed. ❌\n\n`;
            }

            body += `test results summary:

            | Name        | Value                             |
            |-------------|-----------------------------------|
            | Passed   | ${{ steps.report.outputs.passed }}   |
            | Failed   | ${{ steps.report.outputs.failed }}   |
            | Skipped  | ${{ steps.report.outputs.skipped }}  |
            | Time     | ${{ steps.report.outputs.time }} ms  |
            | Details  | https://github.com/Live-Charts/LiveCharts2/actions/runs/${{ github.run_id }} |`

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });