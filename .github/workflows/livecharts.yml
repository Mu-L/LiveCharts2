name: LiveCharts
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

on:
  pull_request:
    branches: [ master, dev ]

jobs:

  report-progress-starting:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1        
      - uses: ./.github/actions/comment-progress
        id: create-comment
        with:
          content: | 
            Thanks for your contribution! 👍👌
            We are starting the build and test process... this may take a while. Please be patient. ⏳
            The generated packages will be available only for 30 days after the workflow run, so make sure to download them before they expire. 📦
            Or just wait for the PR to be merged and published to NuGet.org.
    outputs: 
      comment_id: ${{ steps.create-comment.outputs.comment_id }}

  pack: 
    runs-on: windows-2025
    needs: report-progress-starting
    strategy:
      matrix:
        include:
          - short-name: core
            project: src/LiveChartsCore
          - short-name: skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp
          - short-name: avalonia-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp.Avalonia
            workloads: wasm-tools, maui
          - short-name: blazor-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Blazor
          - short-name: eto-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Eto
          - short-name: maui-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Maui
            workloads: maui
          - short-name: uno-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Uno.WinUI
            workloads: wasm-tools, maui
          - short-name: winui-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.WinUI
          - short-name: winforms-skiasharp            
            project: src/skiasharp/LiveChartsCore.SkiaSharp.WinForms
          - short-name: wpf-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp.WPF          
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Setup .NET and Workloads
        uses: ./.github/actions/setup-dotnet-and-workloads
        with:
          workloads: ${{ matrix.workloads }}

      - name: Pack
        run: 
          dotnet pack ${{ matrix.project }} -c Release -o artifacts /p:IsPacking=true /p:LiveChartsVersionSuffix=-${{ github.sha }}

      - name: Upload packages
        id: upload
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.short-name }}-package
          retention-days: 30
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: Update comment progress
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
          content: |
            ✅ Packing of **${{ matrix.short-name }}** completed. | [download](${{ steps.upload.outputs.artifact-url }})

  test-core:
    runs-on: windows-2025
    needs: [pack, report-progress-starting]
    strategy:
      fail-fast: false
      matrix:
        framework: [ net8.0, net462 ]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          id: core
          use-factos: false
          target-framework: ${{ matrix.framework }}
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-windows:
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          - id: eto
          - id: maui
            tf: net10.0-windows10.0.19041.0
            workloads: maui
          - id: uno
            tf: net10.0-desktop
            workloads: maui
          - id: winforms
          - id: winui
          - id: wpf
    needs: [pack, report-progress-starting]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: windows
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          # - id: eto, requires additional setup i think...
          - id: uno
            tf: net10.0-desktop
            workloads: android
    needs: [pack, report-progress-starting]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@v4.2

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: linux
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-android
            workloads: android
          - id: maui
            tf: net10.0-android
            workloads: maui-android
          - id: uno
            tf: net10.0-android
            workloads: android
    needs: [pack, report-progress-starting]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: android
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          use-android-emulator: true
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-mac:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          - id: eto
          - id: maui
            tf: net10.0-maccatalyst
            workloads: maui
          - id: uno
            tf: net10.0-desktop
            workloads: maui
    needs: [pack, report-progress-starting]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: mac
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          xcode-path: /Applications/Xcode_26.2.app
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  test-ios:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-ios
            workloads: ios
          - id: maui
            tf: net10.0-ios
            workloads: maui
          - id: uno
            tf: net10.0-ios
            workloads: ios android
    needs: [pack, report-progress-starting]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: ios
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          xcode-path: /Applications/Xcode_26.2.app
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
