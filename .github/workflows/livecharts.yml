name: LiveCharts

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:

  comment-progress:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: ./.github/actions/comment-progress
        id: create-comment
    outputs: 
      comment_id: ${{ steps.create-comment.outputs.comment_id }}

  pack: 
    runs-on: windows-2025    
    strategy:
      matrix:
        include:
          - short-name: core
            project: src/LiveChartsCore

          - short-name: skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp

          - short-name: avalonia-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp.Avalonia
            workloads: [ wasm-tools, maui ]

          - short-name: blazor-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Blazor

          - short-name: eto-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Eto

          - short-name: maui-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Maui
            workloads: [ maui ]

          - short-name: uno-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Uno.WinUI
            workloads: [ wasm-tools, maui ]

          - short-name: winui-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.WinUI

          - short-name: winforms-skiasharp            
            project: src/skiasharp/LiveChartsCore.SkiaSharp.WinForms

          - short-name: wpf-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp.WPF
          
    steps: 
      - name: Checkout 
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0 # important for deterministic builds?
      
      - name: Setup .NET 
        uses: actions/setup-dotnet@v5.0.1
        with: 
          dotnet-version: '10.0.100'

      - name: Install Workloads 
        if: ${{ matrix.workloads }} 
        shell: pwsh 
        run: | 
          $workloads = "${{ join(matrix.workloads, ' ') }}".Split(' ')
          foreach ($workload in $workloads) {
            dotnet workload install $workload
          }
      
      - name: Pack
        run: dotnet pack ${{ matrix.project }} -c Release -o artifacts /p:IsPacking=true /p:LiveChartsVersionSurfix=-${{ github.sha }}
        
      - name: Publish
        run: |
          dotnet nuget push **/*.nupkg --source "https://nuget.pkg.github.com/beto-rodriguez/index.json" --api-key ${{ secrets.GH_TOKEN }}
          dotnet nuget push **/*.snupkg --source "https://nuget.pkg.github.com/beto-rodriguez/index.json" --api-key ${{ secrets.GH_TOKEN }}

      - name: Upload test results
        id: upload
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.short-name }}-package
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

  update-packed-progress:
    runs-on: ubuntu-24.04
    needs: [pack, comment-progress]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v7.0.0
        with:
          path: collected

      - name: Flatten packages 
        run: | 
          mkdir -p flat 
          find collected -type f -name '*.nupkg' -exec cp {} flat/ \;
          find collected -type f -name '*.snupkg' -exec cp {} flat/ \;

      - name: Upload packages
        id: upload
        uses: actions/upload-artifact@v6.0.0 
        with:
          name: livecharts-${{ github.sha }}
          path: flat/*        

      - name: Update comment progress
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.comment-progress.outputs.comment_id }}
          complete_nuget: ${{ steps.upload.outputs.artifact-url }}

  test-core:
    runs-on: ubuntu-24.04
    needs: pack
    strategy:
      matrix:
        framework: [ net8.0, net462 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.1
        with:
          dotnet-version: '10.0.100'

      - name: Run unit tests
        run: dotnet run --project tests/CoreTests/CoreTests.csproj -f ${{ matrix.framework }} --report-trx -p:UseNuGetPackages=true -p:LiveChartsVersionSurfix=-${{ github.sha }}

      - name: Upload test results
        uses: actions/upload-artifact@v6.0.0
        with:
          name: core-results-${{ matrix.framework }}
          path: "**/*.trx"

  ui-test-windows:
    runs-on: windows-2025
    strategy:
      matrix:
        include:
          - id: avalonia-desktop
          - id: eto
          - id: maui
            tf: net10.0-windows10.0.19041.0
          - id: uno
            tf: net10.0-desktop
          - id: winforms
          - id: winui
          - id: wpf
    needs: pack
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.0.1
        with:
          dotnet-version: '10.0.100'

      - name: Run tests
        run: dotnet run --project tests/UITests -c Release --report-trx --no-progress --select ${{ matrix.id }} --test-env tf=${{ matrix.tf }}

      - name: Upload test results
        uses: actions/upload-artifact@v6.0.0
        with:
          name: win-results-${{ matrix.id }}
          path: "**/*.trx"

  results-core-test:
    runs-on: ubuntu-24.04
    needs: [test-core, comment-progress]
    permissions:
      contents: read
      actions: read
      checks: write
      issues: write 
      pull-requests: write
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Download artifacts
        uses: actions/download-artifact@v7.0.0
        with:
          path: core-results
          pattern: core-results-*

      - name: Publish results
        id: report
        uses: dorny/test-reporter@v2.4.0
        with:
          name: core-results
          path: "core-results/**/*.trx"
          reporter: dotnet-trx

      - name: Update comment progress
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.comment-progress.outputs.comment_id }}
          complete_core_tests: ${{ steps.report.outputs.conclusion }}

  results-ui-windows:
    runs-on: ubuntu-24.04
    needs: [ui-test-windows, comment-progress]
    permissions:
      contents: read
      actions: read
      checks: write
      issues: write 
      pull-requests: write
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Download artifacts
        uses: actions/download-artifact@v7.0.0
        with:
          path: win-results
          pattern: win-results-*

      - name: Publish results
        id: report
        uses: dorny/test-reporter@v2.4.0
        with:
          name: win-results
          path: "win-results/**/*.trx"
          reporter: dotnet-trx

      - name: Update comment progress
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.comment-progress.outputs.comment_id }}
          complete_win_tests: ${{ steps.report.outputs.conclusion }}
          