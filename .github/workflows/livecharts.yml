name: LiveCharts
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

on:
  pull_request:
    branches: [ master, dev ]

jobs:

  report-progress-starting:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1        
      - uses: ./.github/actions/comment-progress
        id: create-comment
    outputs: 
      comment_id: ${{ steps.create-comment.outputs.comment_id }}

  pack: 
    runs-on: windows-2025    
    strategy:
      matrix:
        include:
          - short-name: core
            project: src/LiveChartsCore
          - short-name: skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp
          - short-name: avalonia-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp.Avalonia
            workloads: wasm-tools, maui
          - short-name: blazor-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Blazor
          - short-name: eto-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Eto
          - short-name: maui-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Maui
            workloads: maui
          - short-name: uno-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.Uno.WinUI
            workloads: wasm-tools, maui
          - short-name: winui-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharpView.WinUI
          - short-name: winforms-skiasharp            
            project: src/skiasharp/LiveChartsCore.SkiaSharp.WinForms
          - short-name: wpf-skiasharp
            project: src/skiasharp/LiveChartsCore.SkiaSharp.WPF          
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Setup .NET and Workloads
        uses: ./.github/actions/setup-dotnet-and-workloads
        with:
          workloads: ${{ matrix.workloads }}

      - name: Pack
        run: 
          dotnet pack ${{ matrix.project }} -c Release -o artifacts /p:IsPacking=true /p:LiveChartsVersionSuffix=-${{ github.sha }}

      - name: Upload test results
        id: upload
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ matrix.short-name }}-package
          retention-days: 30
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

  report-progress-packed:
    runs-on: ubuntu-24.04
    needs: [pack, report-progress-starting]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - uses: actions/download-artifact@v7.0.0
        with:
          path: collected

      - name: Flatten packages 
        run: | 
          mkdir -p flat 
          find collected -type f -name '*.nupkg' -exec cp {} flat/ \;
          find collected -type f -name '*.snupkg' -exec cp {} flat/ \;

      - name: Upload packages
        id: upload
        uses: actions/upload-artifact@v6.0.0 
        with:
          name: livecharts-${{ github.sha }}
          retention-days: 30
          path: flat/*        

      - name: Update comment progress
        uses: ./.github/actions/comment-progress
        with:
          comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}
          complete_nuget: ${{ steps.upload.outputs.artifact-url }}

  test-core:
    runs-on: windows-2025
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        framework: [ net8.0, net462 ]
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          id: core
          use-factos: false
          target-framework: ${{ matrix.framework }}

  test-windows:
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          - id: eto
          - id: maui
            tf: net10.0-windows10.0.19041.0
            workloads: maui
          - id: uno
            tf: net10.0-desktop
            workloads: maui
          - id: winforms
          - id: winui
          - id: wpf
    needs: pack
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: windows
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}

  test-linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          # - id: eto, requires additional setup i think...
          - id: uno
            tf: net10.0-desktop
            workloads: android
    needs: pack
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@v4.2

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: linux
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}

  test-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-android
            workloads: android
          - id: maui
            tf: net10.0-android
            workloads: maui-android
          - id: uno
            tf: net10.0-android
            workloads: android
    needs: pack
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: android
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          use-android-emulator: true

  test-mac:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-desktop
          - id: eto
          - id: maui
            tf: net10.0-maccatalyst
            workloads: maui
          - id: uno
            tf: net10.0-desktop
            workloads: maui
    needs: pack
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: mac
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          xcode-path: /Applications/Xcode_26.2.app

  test-ios:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: avalonia-ios
            workloads: ios
          - id: maui
            tf: net10.0-ios
            workloads: maui
          - id: uno
            tf: net10.0-ios
            workloads: ios android
    needs: pack
    steps:
      - name: Checkout 
        uses: actions/checkout@v6.0.1

      - name: Run UI tests
        uses: ./.github/actions/run-tests
        with:
          id: ios
          use-factos: true
          test-id: ${{ matrix.id }}
          workloads: ${{ matrix.workloads }}
          target-framework: ${{ matrix.tf }}
          xcode-path: /Applications/Xcode_26.2.app

  report-progress-core:
    needs: [test-core, report-progress-starting]
    uses: ./.github/workflows/report-progress.yml
    if: always()
    with:
      id: core
      comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  report-progress-windows:
    needs: [test-windows, report-progress-starting]
    uses: ./.github/workflows/report-progress.yml
    if: always()
    with:
      id: windows
      comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  report-progress-linux:
    needs: [test-linux, report-progress-starting]
    uses: ./.github/workflows/report-progress.yml
    if: always()
    with:
      id: linux
      comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  report-progress-mac:
    needs: [test-mac, report-progress-starting]
    uses: ./.github/workflows/report-progress.yml
    if: always()
    with:
      id: mac
      comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  report-progress-ios:
    needs: [test-ios, report-progress-starting]
    uses: ./.github/workflows/report-progress.yml
    if: always()
    with:
      id: ios
      comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}

  report-progress-android:
    needs: [test-android, report-progress-starting]
    uses: ./.github/workflows/report-progress.yml
    if: always()
    with:
      id: android
      comment_id: ${{ needs.report-progress-starting.outputs.comment_id }}