name: Auto Rerun

# Reruns failed jobs of the LiveCharts workflow up to 2 times to absorb
# transient infra flakes (artifact downloads, nuget feed validation,
# runner/network blips). Caps at run_attempt < 3 to avoid masking real
# regressions and to bound wallclock cost.

on:
  workflow_run:
    workflows: [LiveCharts]
    types: [completed]

permissions:
  contents: read
  actions: write

jobs:
  rerun:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3 &&
      (github.event.workflow_run.event == 'pull_request' ||
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-24.04
    steps:
      - name: Rerun failed jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          echo "Run $RUN_ID failed on attempt $ATTEMPT — rerunning failed jobs (attempt $((ATTEMPT + 1)) of 3)."
          gh run rerun "$RUN_ID" --failed --repo "$GITHUB_REPOSITORY"
